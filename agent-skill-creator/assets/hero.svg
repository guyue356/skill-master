<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Agent Skill Creator: turn a workflow description into a validated skill installed across 17 platforms">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect width="960" height="360" rx="14" fill="url(#bg)"/>

  <!-- Title -->
  <text x="32" y="46" fill="#e6edf3" font-size="22" font-weight="700">Agent Skill Creator</text>
  <text x="32" y="72" fill="#8b949e" font-size="14">Describe a workflow → get validated, cross-platform agent software. No spec writing. No coding.</text>

  <!-- Stage 1: input -->
  <g>
    <rect x="32" y="110" width="220" height="200" rx="10" fill="#0d1117" stroke="#30363d"/>
    <text x="48" y="136" fill="#7c3aed" font-size="12" font-weight="700">YOU DESCRIBE</text>
    <text x="48" y="166" fill="#c9d1d9" font-size="13">“Every Friday I clean the</text>
    <text x="48" y="186" fill="#c9d1d9" font-size="13">CRM export and email a</text>
    <text x="48" y="206" fill="#c9d1d9" font-size="13">regional sales report.”</text>
    <text x="48" y="244" fill="#8b949e" font-size="12">…or a PDF, a link, a script,</text>
    <text x="48" y="262" fill="#8b949e" font-size="12">a transcript, a vague idea.</text>
  </g>

  <line x1="258" y1="210" x2="338" y2="210" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 2: pipeline -->
  <g>
    <rect x="344" y="110" width="272" height="200" rx="10" fill="#0d1117" stroke="#30363d"/>
    <text x="360" y="136" fill="#2563eb" font-size="12" font-weight="700">5-PHASE PIPELINE</text>
    <g font-size="12.5" fill="#c9d1d9">
      <text x="360" y="166">1 · Discovery</text>
      <text x="360" y="190">2 · Design + evals</text>
      <text x="360" y="214">3 · Architecture</text>
      <text x="360" y="238">4 · Detection</text>
      <text x="360" y="262">5 · Build · validate · scan</text>
    </g>
    <text x="360" y="292" fill="#8b949e" font-size="11">deterministic · tested · security-scanned</text>
  </g>

  <line x1="622" y1="210" x2="702" y2="210" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 3: output -->
  <g>
    <rect x="708" y="110" width="220" height="200" rx="10" fill="#0d1117" stroke="#30363d"/>
    <text x="724" y="136" fill="#2563eb" font-size="12" font-weight="700">INSTALLS EVERYWHERE</text>
    <rect x="724" y="150" width="188" height="44" rx="8" fill="url(#accent)"/>
    <text x="818" y="178" fill="#ffffff" font-size="20" font-weight="700" text-anchor="middle">17 platforms</text>
    <g font-size="11.5" fill="#8b949e">
      <text x="724" y="222">Claude Code · Cursor · Copilot</text>
      <text x="724" y="242">Gemini · Windsurf · Cline · Kiro</text>
      <text x="724" y="262">Codex · Goose · Roo · Factory …</text>
    </g>
    <text x="724" y="292" fill="#c9d1d9" font-size="11">one skill · same result · every tool</text>
  </g>
</svg>
